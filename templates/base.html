<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard{% endblock %} - Blog Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e5e7eb;
            --success: #10b981;
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            flex-wrap: wrap;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.1rem;
            margin-right: 1.5rem;
            color: var(--text);
            text-decoration: none;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.15s, color 0.15s;
        }
        nav a:hover { background: var(--bg); color: var(--text); }
        nav a.active { background: var(--primary); color: white; }
        nav .spacer { flex: 1; }
        nav .logout { color: var(--text-muted); font-size: 0.85rem; }
        main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .date-picker {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .date-picker label { font-size: 0.85rem; color: var(--text-muted); }
        .date-picker input[type="date"] {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
        }
        .date-picker button {
            padding: 0.4rem 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .date-picker button:hover { background: var(--primary-hover); }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
        }
        .card h2 { font-size: 2rem; font-weight: 700; line-height: 1.2; }
        .card p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }
        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2.section { font-size: 1.15rem; margin: 1.5rem 0 0.75rem; color: var(--text); }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        thead th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
        }
        thead th.num { text-align: right; }
        tbody td {
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--bg); }
        .url-cell {
            max-width: 500px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            main { padding: 1rem; }
            .cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/dashboard" class="brand">Analytics</a>
        <a href="/dashboard" {% if active_page == "overview" %}class="active"{% endif %}>Overview</a>
        <a href="/dashboard/articles" {% if active_page == "articles" %}class="active"{% endif %}>Articles</a>
        <a href="/dashboard/rss" {% if active_page == "rss" %}class="active"{% endif %}>RSS</a>
        <a href="/dashboard/bots" {% if active_page == "bots" %}class="active"{% endif %}>Bots</a>
        <a href="/dashboard/referrers" {% if active_page == "referrers" %}class="active"{% endif %}>Referrers</a>
        <a href="/dashboard/geo" {% if active_page == "geo" %}class="active"{% endif %}>Geography</a>
        <span class="spacer"></span>
        <a href="/dashboard/logout" class="logout">Logout</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
